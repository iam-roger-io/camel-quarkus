%dev.quarkus.datasource.password=admin
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/pessoadb

upload-processor-config.upload-dir=/Users/lincolnalves/Downloads/upload_data/
upload-processor-config.batch-processor-url=http://localhost:9000
%dev.verify.person.url=http://localhost:9100/verify/person
#%dev.verify.person.url=http://camel-quarkus-soap-camel-quarkus-demo.apps.cluster-gclkf.gclkf.sandbox129.opentlc.com/verify/person

# The AMQP broker location and credentials
%dev.amqp-host=localhost
%dev.amqp-port=5672
%dev.amqp-username=quarkus
%dev.amqp-password=quarkus

# Configuring the incoming channel (reading from AMQP)
%dev.mp.messaging.incoming.validate-person-in.connector=smallrye-amqp
%dev.mp.messaging.incoming.validate-person-in.address=validate_person_q

# Configuring the outgoing channel (writing to AMQP)
%dev.mp.messaging.outgoing.validate-person-out.connector=smallrye-amqp
%dev.mp.messaging.outgoing.validate-person-out.address=validate_person_q
%dev.mp.messaging.outgoing.validate-person-out.merge=true

quarkus.log.level=INFO
quarkus.log.category."org.hibernate".level=INFO
